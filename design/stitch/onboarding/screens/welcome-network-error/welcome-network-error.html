<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            "error": "#ba1a1a",

            "inverse-primary": "#bec2ff",
            "state-attention-dark": "#FF887D",
            "on-error-container": "#93000a",
            "on-surface": "#171c24",

    <style>
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .border-subtle {
      border: 1px solid var(--tw-colors-outline-variant);
    }
    .glass-blur {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    </style>
    <style>
    body {
      min-height: max(884px, 100dvh);
    }
    </style>
  </head>
  <body class="bg-background text-on-surface h-screen w-full flex flex-col overflow-hidden">
    <!-- TopAppBar from JSON -->
    <header
      class="w-full top-0 bg-background dark:bg-surface-dark flex items-center justify-between px-gutter h-16 shrink-0 z-50">
      <button aria-label="Close"
        class="hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform duration-150 text-outline dark:text-outline-variant p-2 -ml-2">
        <span class="material-symbols-outlined">close</span>
      </button>
      <div
        class="font-screen-title text-screen-title tracking-tight text-on-surface dark:text-on-surface">
            TRACEND
        </div>
      <!-- Empty div for flex spacing balance -->
      <div class="w-10"></div>
    </header>
    <!-- Main Content Canvas -->
    <main
      class="flex-1 overflow-y-auto px-gutter pb-xxxl flex flex-col justify-center items-center">
      <div class="w-full max-w-md mx-auto space-y-xl">
        <!-- Trajectory/Branding Element -->
        <div class="flex justify-center mb-xxl opacity-50">
          <svg fill="none" height="48" viewbox="0 0 48 48" width="48"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M12 36L24 24L36 36" stroke="currentColor" stroke-linecap="round"
              stroke-linejoin="round" stroke-width="1.5"></path>
            <path d="M24 24L36 12" stroke="currentColor" stroke-linecap="round"
              stroke-linejoin="round" stroke-width="1.5"></path>
            <circle cx="12" cy="36" fill="currentColor" r="3"></circle>
            <circle cx="24" cy="24" fill="currentColor" r="3"></circle>
            <path d="M38 10L36 12L34 10" stroke="currentColor" stroke-linecap="round"
              stroke-linejoin="round" stroke-width="1.5"></path>
          </svg>
        </div>
        <!-- Decision Surface / Attention Card -->
        <div class="bg-surface-light rounded-lg border-subtle overflow-hidden relative">
          <!-- Attention Accent Line -->
          <div class="absolute top-0 left-0 w-full h-[2px] bg-[#FF887D]"></div>
          <div class="p-xl space-y-lg text-center mt-sm">
            <div
              class="w-12 h-12 mx-auto rounded-full bg-error-container text-error flex items-center justify-center mb-md">
              <span class="material-symbols-outlined"
                style="font-variation-settings: 'FILL' 1;">wifi_off</span>
            </div>
            <h1 class="font-decision-headline text-decision-headline text-on-surface">
                        Connection interrupted
                    </h1>
            <p class="font-body-base text-body-base text-on-surface-variant max-w-[280px] mx-auto">
                        Review your network environment to continue.
                    </p>
            <!-- Technical Readout -->
            <div
              class="bg-surface-container-low border border-outline-variant rounded p-md flex items-center justify-between mt-lg">
              <span class="font-label-caps text-label-caps text-outline uppercase">Error Code</span>
              <span
                class="font-data-utility text-data-utility text-on-surface">ERR_TIMEOUT_09</span>
            </div>
          </div>
          <!-- Actions -->
          <div class="px-xl pb-xl space-y-md flex flex-col mt-sm">
            <button
              class="w-full h-[52px] bg-primary text-on-primary rounded font-body-base text-body-base flex items-center justify-center hover:opacity-90 active:scale-95 transition-all duration-160">
                        Retry Connection
                    </button>
            <button
              class="w-full h-[52px] bg-transparent text-primary rounded font-body-base text-body-base flex items-center justify-center hover:bg-surface-container-low active:scale-95 transition-all duration-160">
                        Contact Support
                    </button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
