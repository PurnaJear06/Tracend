<!DOCTYPE html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
      name="viewport" />
    <title>Tracend Onboarding</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&amp;family=Inter:wght@400;600&amp;family=Spline+Sans:wght@600&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-variant": "#dee2ee",
            "tertiary-fixed-dim": "#ffb692",
            "state-stable": "#00796B",
            "secondary-fixed": "#d7e4f5",
            "on-secondary-fixed-variant": "#3c4856",
            "error": "#ba1a1a",
            "secondary-fixed-dim": "#bbc8d9",
            "primary-fixed-dim": "#bec2ff",
            "on-error-container": "#93000a",
            "on-surface": "#F4F7FB", // Override for user request "Text: #F4F7FB"
            "state-attention-dark": "#FF887D",
            "on-primary-fixed-variant": "#202dc5",
            "on-primary": "#ffffff",
            "surface-container-low": "#f0f3ff",
            "canvas-light": "#F3F6F8",
            "canvas-dark": "#090D14",
            "surface-container-high": "#e4e8f4",
            "surface-light": "#FFFFFF",
            "state-attention": "#C43C31",
            "on-secondary-container": "#586473",
            "inverse-surface": "#2c3139",
            "tertiary": "#893800",
            "on-primary-container": "#e8e7ff",
            "tertiary-fixed": "#ffdbcb",
            "surface-container": "#eaeefa",
            "on-tertiary-fixed-variant": "#793100",
            "surface-bright": "#f9f9ff",
            "surface-dim": "#d6dae5",
            "primary-fixed": "#e0e0ff",
            "on-tertiary-fixed": "#341100",
            "on-primary-fixed": "#000569",
            "action-primary-dark": "#9BA5FF",
            "on-secondary": "#ffffff",
            "on-tertiary-container": "#ffe4d9",
            "secondary": "#535f6e",
            "on-background": "#171c24",
            "on-surface-variant": "#AAB5C5", // Override for user request "Secondary Text: #AAB5C5"
            "error-container": "#ffdad6",
            "surface-dark": "#121925",
            "on-error": "#ffffff",
            "outline": "#767686",
            "on-secondary-fixed": "#101c29",
            "on-tertiary": "#ffffff",
            "background": "#090D14", // Mapping to Canvas Dark
            "outline-variant": "#c6c5d7",
            "primary": "#2e3bcf",
            "surface-container-highest": "#dee2ee",
            "tertiary-container": "#b04a00",
            "surface": "#121925", // Mapping to Surface
            "surface-tint": "#3e4bdd",
            "inverse-primary": "#bec2ff",
            "state-stable-dark": "#59D6C7",
            "surface-container-lowest": "#ffffff",
            "inverse-on-surface": "#edf1fc",
            "secondary-container": "#d4e1f3",
            "primary-container": "#4a57e8",
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px",
          },
          "spacing": {
            "xxxl": "48px",
            "gutter-compact": "16px",
            "gutter": "20px",
            "xxl": "32px",
            "base": "4px",
            "xl": "24px",
            "lg": "16px",
            "sm": "8px",
            "xs": "4px",
            "md": "12px",
          },
          "fontFamily": {
            "data-utility": ["IBM Plex Mono"],
            "body-compact": ["Inter"],
            "decision-headline": ["Spline Sans"],
            "section-title": ["Spline Sans"],
            "label-caps": ["Inter"],
            "screen-title": ["Spline Sans"],
            "body-base": ["Inter"],
          },
          "fontSize": {
            "data-utility": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
            "body-compact": ["15px", { "lineHeight": "22px", "fontWeight": "400" }],
            "decision-headline": ["32px", {
              "lineHeight": "36px",
              "letterSpacing": "-0.01em",
              "fontWeight": "600",
            }],
            "section-title": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
            "label-caps": ["12px", {
              "lineHeight": "16px",
              "letterSpacing": "0.05em",
              "fontWeight": "600",
            }],
            "screen-title": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
            "body-base": ["17px", { "lineHeight": "25px", "fontWeight": "400" }],
          },
        },
      },
    };
    </script>
    <style>
    body {
      background-color: theme('colors.canvas-dark');
      color: theme('colors.on-surface');
      -webkit-tap-highlight-color: transparent;
    }

    .hairline-border {
      border: 1px solid rgba(118, 118, 134, 0.2); /* outline very subtle */
    }

    .selected-card-glow {
      box-shadow: inset 0 0 0 1px theme('colors.action-primary-dark'), 0 4px 20px -4px rgba(155, 165,
        255, 0.15);
      border-color: theme('colors.action-primary-dark');
      background-color: rgba(155, 165, 255, 0.05);
    }

    /* Ensure specific icon weight */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    /* Smooth transitions for selection */
    .option-card {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    </style>
    <style>
    body {
      min-height: max(884px, 100dvh);
    }
    </style>
  </head>
  <body class="min-h-screen flex flex-col pt-safe-top pb-safe-bottom font-body-base bg-canvas-dark">
    <!-- Top Navigation (Transactional/Linear flow, keeping minimal) -->
    <header
      class="w-full top-0 sticky flex items-center justify-between px-gutter h-14 bg-canvas-dark z-50">
      <button
        class="flex items-center justify-center w-10 h-10 -ml-2 text-on-surface-variant hover:text-on-surface transition-colors"
        type="button">
        <span class="material-symbols-outlined text-[24px]">arrow_back</span>
      </button>
      <!-- No headline for this specific step to keep focus on the main question -->
      <div class="w-10"></div>
      <!-- Balancer -->
    </header>
    <main class="flex-1 flex flex-col px-gutter pt-xl pb-xxxl">
      <!-- Header Section -->
      <div class="mb-xxl">
        <h1
          class="font-decision-headline text-decision-headline text-on-surface mb-md tracking-tight">How should we build your plan?</h1>
        <p
          class="font-body-base text-[16px] leading-[24px] text-on-surface-variant">Choose the starting point that best matches your experience.</p>
      </div>
      <!-- Selection Cards -->
      <div class="flex flex-col gap-lg flex-1">
        <!-- Card 1: Guide Me -->
        <label
          class="option-card relative flex flex-col p-lg rounded-xl bg-surface-dark hairline-border cursor-pointer group hover:bg-[#151c2a]">
          <input checked="" class="peer sr-only" name="plan_type" type="radio" value="guide" />
          <!-- Selected State Overlay via peer-checked -->
          <div
            class="absolute inset-0 rounded-xl border border-transparent peer-checked:border-action-primary-dark peer-checked:bg-action-primary-dark/5 transition-all pointer-events-none"></div>
          <div class="flex items-start gap-md relative z-10">
            <div
              class="flex-shrink-0 w-12 h-12 rounded-lg bg-canvas-dark hairline-border flex items-center justify-center text-on-surface group-hover:text-action-primary-dark peer-checked:text-action-primary-dark transition-colors">
              <span class="material-symbols-outlined text-[28px]">explore</span>
            </div>
            <div class="flex-1 pt-1">
              <div class="flex justify-between items-center mb-xs">
                <h2 class="font-section-title text-section-title text-on-surface">Guide me</h2>
                <!-- Custom Radio Indicator -->
                <div
                  class="w-5 h-5 rounded-full border border-on-surface-variant flex items-center justify-center group-[&amp;:has(:checked)]:border-action-primary-dark group-[&amp;:has(:checked)]:bg-action-primary-dark transition-colors">
                  <div
                    class="w-2 h-2 rounded-full bg-canvas-dark opacity-0 group-[&amp;:has(:checked)]:opacity-100 transition-opacity"></div>
                </div>
              </div>
              <p
                class="font-body-compact text-body-compact text-on-surface-variant">I want Tracend to build my training and nutrition plan from my goals, schedule, equipment, and preferences.</p>
            </div>
          </div>
        </label>
        <!-- Card 2: Preserve Plan -->
        <label
          class="option-card relative flex flex-col p-lg rounded-xl bg-surface-dark hairline-border cursor-pointer group hover:bg-[#151c2a]">
          <input class="peer sr-only" name="plan_type" type="radio" value="preserve" />
          <!-- Selected State Overlay via peer-checked -->
          <div
            class="absolute inset-0 rounded-xl border border-transparent peer-checked:border-action-primary-dark peer-checked:bg-action-primary-dark/5 transition-all pointer-events-none"></div>
          <div class="flex items-start gap-md relative z-10">
            <div
              class="flex-shrink-0 w-12 h-12 rounded-lg bg-canvas-dark hairline-border flex items-center justify-center text-on-surface group-hover:text-action-primary-dark peer-checked:text-action-primary-dark transition-colors">
              <span class="material-symbols-outlined text-[28px]">content_paste</span>
            </div>
            <div class="flex-1 pt-1">
              <div class="flex justify-between items-center mb-xs">
                <h2
                  class="font-section-title text-section-title text-on-surface">I know my current plan</h2>
                <!-- Custom Radio Indicator -->
                <div
                  class="w-5 h-5 rounded-full border border-on-surface-variant flex items-center justify-center group-[&amp;:has(:checked)]:border-action-primary-dark group-[&amp;:has(:checked)]:bg-action-primary-dark transition-colors">
                  <div
                    class="w-2 h-2 rounded-full bg-canvas-dark opacity-0 group-[&amp;:has(:checked)]:opacity-100 transition-opacity"></div>
                </div>
              </div>
              <p
                class="font-body-compact text-body-compact text-on-surface-variant">I already train consistently and want Tracend to preserve what works before suggesting changes.</p>
            </div>
          </div>
        </label>
      </div>
      <!-- Bottom Action Area -->
      <div class="mt-auto pt-xxxl">
        <button
          class="w-full h-[52px] flex items-center justify-center rounded-lg bg-action-primary-dark text-canvas-dark font-section-title text-section-title transition-transform active:scale-[0.98]"
          type="button">
                Continue
            </button>
        <p
          class="text-center mt-md text-[13px] leading-[18px] text-on-surface-variant px-sm font-body-compact">
                You can review every assumption before anything becomes active.
            </p>
      </div>
    </main>
    <script>
    // Optional JS to handle the radio button visual state cleanly if needed for specific logic,
    // though CSS handles the visual selection via :checked state.
    document.querySelectorAll('input[name="plan_type"]').forEach((radio) => {
      radio.addEventListener("change", (e) => {
        // Remove visual focus ring if clicked by mouse to keep it clean
        e.target.blur();
      });
    });
    </script>
  </body>
</html>
