<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tracend - Eligibility &amp; Agreement</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#000569",

                        "tertiary-container": "#b04a00",
                        "surface-dim": "#d6dae5",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#edf1fc",
                        "background": "#f9f9ff",
                        "state-attention": "#C43C31",
                        "surface-variant": "#dee2ee",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#d7e4f5",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2c3139",
                        "state-stable-dark": "#59D6C7",
                        "inverse-primary": "#bec2ff",
                        "secondary": "#535f6e",
                        "on-secondary": "#ffffff",
                        "on-background": "#171c24",
                        "on-secondary-container": "#586473",
                        "canvas-dark": "#090D14",
                        "state-attention-dark": "#FF887D",
                        "primary-fixed-dim": "#bec2ff",
                        "surface-dark": "#121925",
                        "outline-variant": "#c6c5d7",
                        "on-surface-variant": "#454655",
                        "on-primary-fixed-variant": "#202dc5",
                        "surface": "#f9f9ff",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#e8e7ff",
                        "on-secondary-fixed": "#101c29",
                        "tertiary": "#893800",
                        "secondary-fixed-dim": "#bbc8d9",
                        "on-tertiary-fixed": "#341100",
                        "primary-fixed": "#e0e0ff",
                        "surface-container": "#eaeefa",
                        "state-stable": "#00796B",
                        "action-primary-dark": "#9BA5FF",
                        "on-surface": "#171c24",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#2e3bcf",
                        "surface-tint": "#3e4bdd",
                        "surface-container-highest": "#dee2ee",
                        "canvas-light": "#F3F6F8",
                        "secondary-container": "#d4e1f3",
                        "error-container": "#ffdad6",
                        "outline": "#767686",
                        "surface-bright": "#f9f9ff",
                        "on-tertiary-container": "#ffe4d9",
                        "primary-container": "#4a57e8",
                        "on-tertiary-fixed-variant": "#793100",
                        "tertiary-fixed-dim": "#ffb692",
                        "tertiary-fixed": "#ffdbcb",
                        "on-secondary-fixed-variant": "#3c4856",
                        "surface-container-high": "#e4e8f4",
                        "surface-light": "#FFFFFF"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "24px",
                        "sm": "8px",
                        "base": "4px",
                        "xxl": "32px",
                        "gutter": "20px",
                        "xxxl": "48px",
                        "gutter-compact": "16px",

                    },
                    "fontFamily": {
                        "screen-title": ["Spline Sans"],

                    },
                    "fontSize": {
                        "screen-title": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-compact": ["15px", { "lineHeight": "22px", "fontWeight": "400" }],
                        "decision-headline": ["32px", { "lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "section-title": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-base": ["17px", { "lineHeight": "25px", "fontWeight": "400" }],
                        "data-utility": ["14px", { "lineHeight": "20px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #090D14; /* canvas-dark */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Checkbox Styling for the dark, technical theme */
        .tracend-checkbox {
            appearance: none;
            background-color: transparent;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 24px;
            height: 24px;
            border: 1px solid #454655; /* on-surface-variant */
            border-radius: 4px;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .tracend-checkbox::before {
            content: "";
            width: 14px;
            height: 14px;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em #9BA5FF; /* action-primary-dark */
            background-color: #9BA5FF;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .tracend-checkbox:checked {
            border-color: #9BA5FF;
        }

        .tracend-checkbox:checked::before {
            transform: scale(1);
        }

        .tracend-checkbox:focus-visible {
            outline: 2px solid #9BA5FF;
            outline-offset: 2px;
        }

        /* Continuous Trajectory Line Background Effect */
        .bg-trajectory {
            background-image: 
                linear-gradient(to right, transparent 49px, rgba(155, 165, 255, 0.05) 49px, rgba(155, 165, 255, 0.05) 50px, transparent 50px),
                linear-gradient(to bottom, transparent 49px, rgba(155, 165, 255, 0.05) 49px, rgba(155, 165, 255, 0.05) 50px, transparent 50px);
            background-size: 50px 50px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col bg-trajectory">
<!-- Top App Bar (Modified for transactional context - no back button if it's the very start) -->
<header class="w-full top-0 flex justify-between items-center px-gutter py-md bg-canvas-dark border-b border-[#121925]">
<div class="flex items-center gap-sm">
<!-- Minimalist logo node -->
<div class="w-2 h-2 rounded-full bg-action-primary-dark"></div>
<span class="font-label-caps text-label-caps text-secondary-fixed-dim uppercase tracking-widest">Eligibility</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-gutter pt-xxl pb-xxxl max-w-md mx-auto w-full">
<!-- Header Section -->
<div class="mb-xl">
<h1 class="font-decision-headline text-decision-headline text-white mb-sm">Before we begin</h1>
<p class="font-body-base text-body-base text-[#AAB5C5]">
                Tracend currently supports healthy adults using fitness coaching—not medical care.
            </p>
</div>
<!-- Agreement Rows -->
<div class="flex flex-col gap-md mb-xxxl">
<!-- Row 1 -->
<label class="flex items-start gap-md p-lg bg-surface-dark rounded-lg border border-[#2c3139] cursor-pointer hover:border-action-primary-dark transition-colors">
<div class="pt-xs">
<input class="tracend-checkbox" id="check-age" onchange="checkReadiness()" type="checkbox"/>
</div>
<div class="flex-1">
<span class="font-body-compact text-body-compact text-white select-none">
                        I am 18 or older.
                    </span>
</div>
</label>
<!-- Row 2 -->
<label class="flex items-start gap-md p-lg bg-surface-dark rounded-lg border border-[#2c3139] cursor-pointer hover:border-action-primary-dark transition-colors">
<div class="pt-xs">
<input class="tracend-checkbox" id="check-medical" onchange="checkReadiness()" type="checkbox"/>
</div>
<div class="flex-1">
<span class="font-body-compact text-body-compact text-white select-none">
                        I understand Tracend provides fitness coaching support, not medical advice.
                    </span>
</div>
</label>
<!-- Row 3 -->
<label class="flex items-start gap-md p-lg bg-surface-dark rounded-lg border border-[#2c3139] cursor-pointer hover:border-action-primary-dark transition-colors">
<div class="pt-xs">
<input class="tracend-checkbox" id="check-terms" onchange="checkReadiness()" type="checkbox"/>
</div>
<div class="flex-1">
<span class="font-body-compact text-body-compact text-white select-none">
                        I accept the Private Beta <a class="text-action-primary-dark hover:underline underline-offset-4 decoration-[0.5px]" href="#">Terms</a> and <a class="text-action-primary-dark hover:underline underline-offset-4 decoration-[0.5px]" href="#">Privacy Notice</a>.
                    </span>
</div>
</label>
</div>
<!-- Spacer to push actions to bottom if needed -->
<div class="flex-grow"></div>
<!-- Actions -->
<div class="flex flex-col gap-lg mt-auto">
<button class="w-full h-[52px] rounded flex items-center justify-center font-section-title text-section-title transition-all duration-150 bg-[#2c3139] text-[#586473] cursor-not-allowed" disabled="" id="btn-continue">
                Continue
            </button>
<button class="w-full py-md font-body-compact text-body-compact text-[#AAB5C5] hover:text-white transition-colors">
                Sign out
            </button>
</div>
</main>
<script>
        function checkReadiness() {
            const age = document.getElementById('check-age').checked;
            const medical = document.getElementById('check-medical').checked;
            const terms = document.getElementById('check-terms').checked;
            const btn = document.getElementById('btn-continue');

            if (age && medical && terms) {
                btn.disabled = false;
                // Active State
                btn.classList.remove('bg-[#2c3139]', 'text-[#586473]', 'cursor-not-allowed');
                btn.classList.add('bg-action-primary-dark', 'text-[#090D14]', 'cursor-pointer', 'hover:opacity-90', 'active:scale-[0.98]');
            } else {
                btn.disabled = true;
                // Disabled State
                btn.classList.add('bg-[#2c3139]', 'text-[#586473]', 'cursor-not-allowed');
                btn.classList.remove('bg-action-primary-dark', 'text-[#090D14]', 'cursor-pointer', 'hover:opacity-90', 'active:scale-[0.98]');
            }
        }
    </script>
</body></html>
