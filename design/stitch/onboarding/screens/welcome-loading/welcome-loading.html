<style>
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }
        
        .loading-dot {
            animation: dot-pulse 1.5s infinite ease-in-out both;
        }
        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes dot-pulse {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-canvas-dark text-on-surface h-screen w-full flex flex-col items-center justify-between p-gutter md:p-xxxl antialiased selection:bg-primary-container selection:text-on-primary-container overflow-hidden">

</div>

                    monitoring
                </span>
</div>
<h1 class="font-decision-headline text-decision-headline text-surface-light tracking-tight text-center">
                TRACEND
            </h1>
</div>
<!-- Loading Indicator -->
<div class="mt-xl flex flex-col items-center gap-lg w-full">
<div class="relative w-12 h-12 flex items-center justify-center">
<!-- Pulsing Rings -->
<div class="absolute inset-0 border border-action-primary-dark/30 rounded-full pulse-ring"></div>
<div class="absolute inset-0 border border-action-primary-dark/20 rounded-full pulse-ring" style="animation-delay: 1s;"></div>
<!-- Core Node -->
<div class="w-2 h-2 rounded-full bg-action-primary-dark z-10"></div>
</div>
<!-- Loading Text -->
<div class="text-center mt-md">
<p class="font-body-base text-body-base text-surface-variant/80">
                    Calibrating your instrument for precision tracking.
                </p>
<div class="mt-sm flex justify-center gap-1">
<div class="w-1 h-1 rounded-full bg-action-primary-dark loading-dot"></div>
<div class="w-1 h-1 rounded-full bg-action-primary-dark loading-dot"></div>
<div class="w-1 h-1 rounded-full bg-action-primary-dark loading-dot"></div>
</div>
</div>
