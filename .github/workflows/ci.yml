name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deno:
    name: Deno (fmt + lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.0"

      - name: Format check
        run: deno fmt --check supabase/functions

      - name: Lint
        run: deno lint supabase/functions

      - name: Unit tests (no DB)
        run: deno test --allow-env --allow-net supabase/functions

  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

  flutter-test:
    name: Flutter Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"

      - name: Install dependencies
        run: flutter pub get

      - name: Unit + widget tests
        run: flutter test

  flutter-build:
    name: Flutter iOS Build (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"

      - name: Install dependencies
        run: flutter pub get

      - name: iOS release build (no codesign)
        run: flutter build ios --release --no-codesign
